spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/community_app?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

app:
  storage:
    provider: minio
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    # 本地默认对齐 MinIO 官方/常见 docker 镜像默认账号，降低联调门槛。
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:community-dev}
